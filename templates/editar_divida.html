{% extends "base.html" %}
{% block titulo %}Editar Dívida - Xandão Finance{% endblock %}

{% block conteudo %}
<div class="container">

    <div class="form-card">

        <h1>✏️ Editar Dívida</h1>

        <p class="subtitulo">
            Atualize as informações da sua dívida
        </p>

        <form action="/editar/{{ divida[0] }}" method="POST">

            <select name="tipo">

                <option value="Contas da casa">Contas da casa</option>
                <option value="Transporte">Transporte</option>
                <option value="Cartão de credito">Cartão de credito</option>
                <option value="Educação">Educação</option>
                <option value="Pessoais">Pessoais</option>

            </select>

            <input type="text"
                   name="descricao"
                   value="{{ divida[3] }}"
                   placeholder="Descrição"
                   required>

            <input type="number"
                   name="valor"
                   step="0.01"
                   min="0"
                   value="{{ divida[4] }}"
                   placeholder="Valor"
                   required>

            <input type="number"
                   name="parcelas_total"
                   min="1"
                   value="{{ divida[5] }}"
                   placeholder="Parcelas"
                   required>

            <label>Data de vencimento</label>

            <input type="date"
                   name="vencimento"
                   value="{{ divida[7] }}"
                   required>

            <button type="submit">
                Salvar Alterações
            </button>

        </form>

        <div class="acoes-form">

            <a href="/dividas" class="btn-secundario">
                📊 Voltar para dívidas
            </a>

            <a href="/menu" class="btn-terciario">
                ⬅ Voltar ao menu
            </a>

        </div>

    </div>

</div>
{% endblock %}
